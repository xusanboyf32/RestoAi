services:

  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: restoai
      POSTGRES_PASSWORD: restoai123
      POSTGRES_DB: restoai
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: always

  backend:
    build: ./backend
    restart: always
    ports:
      - "8001:8001"
    env_file:
      - ./backend/.env.docker
    depends_on:
      - db
      - redis
    volumes:
      - ./backend/uploads:/app/uploads
      - hf_cache:/app/.cache/huggingface

  frontend:
    build: ./frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  hf_cache: